version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: svdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sv-network

  keycloak:
     image: quay.io/keycloak/keycloak:26.1.4
     command: start-dev --import-realm
     ports:
       - "8080:8080"
     environment:
       KEYCLOAK_ADMIN: admin
       KEYCLOAK_ADMIN_PASSWORD: admin
       KC_DB: postgres
       KC_DB_URL: jdbc:postgresql://postgres:5432/svdb
       KC_DB_USERNAME: postgres
       KC_DB_PASSWORD: 12345
       KC_HOSTNAME: localhost
       KC_HTTP_ENABLED: "true"
       KC_PROXY: edge
     volumes:
       - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
     depends_on:
       postgres:
         condition: service_healthy
     networks:
       - sv-network

  discovery-server:
    build:
      context: .
      dockerfile: back/discovery-server/Dockerfile
    ports:
      - "8762:8761"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_HOST=postgres

  order-service:
    build:
      context: .
      dockerfile: back/order-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
      keycloak:
        condition: service_started
      client-service:
        condition: service_started
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_HOST=postgres
      - KEYCLOAK_ISSUER_URI=http://localhost:8080/realms/print-sv

  client-service:
    build:
      context: .
      dockerfile: back/client-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_HOST=postgres
      - KEYCLOAK_ISSUER_URI=http://localhost:8080/realms/print-sv

  employee-service:
    build:
      context: .
      dockerfile: back/employee-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_HOST=postgres
      - KEYCLOAK_ISSUER_URI=http://localhost:8080/realms/print-sv

  material-service:
    build:
      context: .
      dockerfile: back/material-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_HOST=postgres
      - KEYCLOAK_ISSUER_URI=http://localhost:8080/realms/print-sv

  api-gateway:
    build:
      context: .
      dockerfile: back/api-gateway/Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      - discovery-server
      - keycloak
      - order-service
      - client-service
    networks:
      - sv-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8080/realms/print-sv

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:8085
    ports:
      - "5174:5174"
    depends_on:
      - api-gateway
    networks:
      - sv-network

networks:
  sv-network:
    driver: bridge

volumes:
  postgres_data:
