              - column:
                  name: order_item_id
        - createIndex:
            tableName: order_materials
            indexName: idx_order_materials_order
            columns:
              - column:
                  name: order_id
        - createIndex:
            tableName: order_materials
            indexName: idx_order_materials_item
            columns:
              - column:
                  name: order_item_id
        - createIndex:
            tableName: order_materials
            indexName: idx_order_materials_material
            columns:
              - column:
                  name: material_id
