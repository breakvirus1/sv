databaseChangeLog:
  # Таблица orders
  - changeSet:
      id: 1
      author: system
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: client_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: total_amount
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: paid_amount
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: debt_amount
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: status
                  type: VARCHAR(30)
              - column:
                  name: production_stage
                  type: VARCHAR(50)
              - column:
                  name: order_date
                  type: DATE
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: manager_id
                  type: BIGINT
              - column:
                  name: launched_at
                  type: TIMESTAMP
              - column:
                  name: ready_at
                  type: TIMESTAMP
              - column:
                  name: accepted_at
                  type: TIMESTAMP
              - column:
                  name: closed_at
                  type: TIMESTAMP
              - column:
                  name: has_documents
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: client_id
            constraintName: fk_orders_client
            referencedTableName: clients
            referencedColumnNames: id
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: manager_id
            constraintName: fk_orders_manager
            referencedTableName: employees
            referencedColumnNames: id
            onDelete: SET NULL

  # Таблица order_items
  - changeSet:
      id: 2
      author: system
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValue: 1
              - column:
                  name: cost
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: ready_date
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            constraintName: fk_order_items_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

  # Таблица order_stages
  - changeSet:
      id: 3
      author: system
      changes:
        - createTable:
            tableName: order_stages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: workshop_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: wait_previous
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: note
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: 'TODO'
              - column:
                  name: source_files
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: order_stages
            baseColumnNames: order_id
            constraintName: fk_order_stages_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: order_stages
            baseColumnNames: workshop_id
            constraintName: fk_order_stages_workshop
            referencedTableName: workshops
            referencedColumnNames: id
            onDelete: RESTRICT

  # Таблица order_materials
  - changeSet:
      id: 4
      author: system
      changes:
        - createTable:
            tableName: order_materials
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: BIGINT
              - column:
                  name: order_item_id
                  type: BIGINT
              - column:
                  name: material_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: waste_coefficient
                  type: NUMERIC(5,3)
                  defaultValue: 1.0
              - column:
                  name: cost
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: order_materials
            baseColumnNames: order_id
            constraintName: fk_order_materials_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: order_materials
            baseColumnNames: order_item_id
            constraintName: fk_order_materials_item
            referencedTableName: order_items
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: order_materials
            baseColumnNames: material_id
            constraintName: fk_order_materials_material
            referencedTableName: materials
            referencedColumnNames: id
            onDelete: RESTRICT

  # Таблица payments
  - changeSet:
      id: 5
      author: system
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payment_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_type
                  type: VARCHAR(50)
              - column:
                  name: details
                  type: VARCHAR(100)
              - column:
                  name: is_partial
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: order_id
            constraintName: fk_payments_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

  # Таблица order_comments
  - changeSet:
      id: 6
      author: system
      changes:
        - createTable:
            tableName: order_comments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_internal
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: order_comments
            baseColumnNames: order_id
            constraintName: fk_order_comments_order
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: order_comments
            baseColumnNames: author_id
            constraintName: fk_order_comments_author
            referencedTableName: employees
            referencedColumnNames: id
            onDelete: SET NULL

  # Таблица files
  - changeSet:
      id: 7
      author: system
      changes:
        - createTable:
            tableName: files
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: original_name
                  type: VARCHAR(255)
              - column:
                  name: file_path
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: VARCHAR(500)
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: order_id
                  type: BIGINT
              - column:
                  name: order_item_id
                  type: BIGINT
              - column:
                  name: uploaded_by
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: files
            baseColumnNames: order_id
            constraintName: fk_files_order
