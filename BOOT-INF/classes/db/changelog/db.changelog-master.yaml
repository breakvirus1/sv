            referencedColumnNames: id
            onDelete: CASCADE

  # Индексы
  - changeSet:
      id: 8
      author: system
      changes:
        - createIndex:
            tableName: orders
            indexName: idx_orders_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: orders
            indexName: idx_orders_due_date
            columns:
              - column:
                  name: due_date
        - createIndex:
            tableName: orders
            indexName: idx_orders_client
            columns:
              - column:
                  name: client_id
        - createIndex:
            tableName: orders
            indexName: idx_orders_manager
            columns:
              - column:
                  name: manager_id
        - createIndex:
            tableName: order_items
            indexName: idx_order_items_order
            columns:
              - column:
                  name: order_id
        - createIndex:
            tableName: order_stages
            indexName: idx_order_stages_order
            columns:
              - column:
                  name: order_id
        - createIndex:
            tableName: order_stages
            indexName: idx_order_stages_workshop
            columns:
              - column:
                  name: workshop_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_order
            columns:
