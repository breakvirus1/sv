databaseChangeLog:
  - changeSet:
      id: 1
      author: system
      changes:
        - createTable:
            tableName: materials
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(20)
              - column:
                  name: price
                  type: NUMERIC(12,2)
                  defaultValue: 0
              - column:
                  name: waste_coefficient
                  type: NUMERIC(5,3)
                  defaultValue: 1.0
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false
