server:
  port: 8085

spring:
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/files/**
          filters:
            - StripPrefix=0
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/print-sv
          jwk-set-uri: http://keycloak:8080/realms/print-sv/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.security: INFO
    com.example.apigateway: INFO
    org.springframework.cloud.gateway: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
