spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/svdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        default_schema: svtables
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/print-sv
          jwk-set-uri: http://keycloak:8080/realms/print-sv/protocol/openid-connect/certs
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

file:
  storage:
    location: /app/uploads

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}

logging:
  level:
    com.example.fileservice: INFO
    org.springframework: INFO
    org.hibernate: INFO
