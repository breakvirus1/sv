server:
  port: 8080

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:svdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.security: DEBUG

# OAuth2 Authorization Server Configuration
spring.security:
  oauth2:
    authorizationserver:
      issuer: ${OAUTH_ISSUER:http://localhost:8085}
