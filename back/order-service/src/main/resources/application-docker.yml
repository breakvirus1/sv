spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/svdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: svtables
  jpa:
    properties:
      hibernate:
        default_schema: svtables
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
          jakarta:
            uri: classpath:ehcache.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/print-sv
          jwk-set-uri: http://keycloak:8080/realms/print-sv/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}

calculator:
  service:
    url: ${CALCULATOR_SERVICE_URL:http://calculator-service:8086}

logging:
  level:
    com.example.orderservice: INFO
    org.springframework: INFO
    org.hibernate: INFO
